# Пример конфигурации Nginx для production
# Основной сайт: orenrtisnab.ru
# Админка: admin.orenrtisnab.ru

upstream orenrtisnab_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name orenrtisnab.ru www.orenrtisnab.ru;

    # ssl_certificate ...
    # ssl_certificate_key ...

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.orenrtisnab.ru;

    # ssl_certificate ...
    # ssl_certificate_key ...

    # Ограничьте доступ по IP (рекомендуется):
    # allow YOUR.OFFICE.IP;
    # deny all;

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
