# Nginx для ОРЕНРТИСНАБ
# Node.js слушает 127.0.0.1:3001 (pnpm start / pm2)
#
# Подключение домена:
#   1. DNS в reg.ru (см. deploy/domain-setup.md)
#   2. Скопировать этот файл: sudo cp deploy/nginx.conf /etc/nginx/sites-available/orenrtisnab
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. sudo certbot --nginx -d orenrtisnab.ru -d www.orenrtisnab.ru -d admin.orenrtisnab.ru
#   5. В .env: ENABLE_HTTPS=true && pm2 restart orenrtisnab --update-env

upstream orenrtisnab_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Общий proxy-блок (чтобы не дублировать)
# Используется во всех server { location / }

# ========== Доступ по IP (можно удалить после переезда на домен) ==========

server {
    listen 80;
    server_name 31.129.103.174;

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# ========== Основной сайт (HTTP → certbot добавит HTTPS) ==========

server {
    listen 80;
    server_name orenrtisnab.ru www.orenrtisnab.ru;

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# ========== Админка ==========

server {
    listen 80;
    server_name admin.orenrtisnab.ru;

    # Раскомментируйте, чтобы ограничить доступ по IP офиса:
    # allow ВАШ.ОФИСНЫЙ.IP;
    # deny all;

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

