# Nginx для ОРЕНРТИСНАБ
# Node.js слушает 127.0.0.1:3001 (pnpm start / pm2)
#
# Установка:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/orenrtisnab
#   sudo ln -sf /etc/nginx/sites-available/orenrtisnab /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d orenrtisnab.ru -d www.orenrtisnab.ru -d admin.orenrtisnab.ru
#
# После certbot в .env: ENABLE_HTTPS=true && pm2 restart orenrtisnab --update-env

upstream orenrtisnab_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ========== HTTP → HTTPS ==========

server {
    listen 80;
    server_name orenrtisnab.ru www.orenrtisnab.ru admin.orenrtisnab.ru 31.129.103.174;
    return 301 https://$host$request_uri;
}

# ========== www → без www (HTTPS) ==========

server {
    listen 443 ssl http2;
    server_name www.orenrtisnab.ru;

    ssl_certificate     /etc/letsencrypt/live/orenrtisnab.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orenrtisnab.ru/privkey.pem;

    return 301 https://orenrtisnab.ru$request_uri;
}

# ========== Основной сайт (HTTPS) ==========

server {
    listen 443 ssl http2;
    server_name orenrtisnab.ru;

    ssl_certificate     /etc/letsencrypt/live/orenrtisnab.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orenrtisnab.ru/privkey.pem;

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# ========== Админка (HTTPS) ==========

server {
    listen 443 ssl http2;
    server_name admin.orenrtisnab.ru;

    ssl_certificate     /etc/letsencrypt/live/orenrtisnab.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orenrtisnab.ru/privkey.pem;

    # Раскомментируйте, чтобы ограничить доступ по IP офиса:
    # allow ВАШ.ОФИСНЫЙ.IP;
    # deny all;

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

# ========== Доступ по IP (HTTPS, опционально) ==========

server {
    listen 443 ssl http2;
    server_name 31.129.103.174;

    ssl_certificate     /etc/letsencrypt/live/orenrtisnab.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orenrtisnab.ru/privkey.pem;

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
