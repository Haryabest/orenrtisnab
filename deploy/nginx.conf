# Nginx для ОРЕНРТИСНАБ
# Node.js слушает 127.0.0.1:3001 (pnpm start / pm2)
#
# Сейчас активен ЭТАП 1 (только IP, без SSL).
# После подключения домена — закомментируйте Этап 1, раскомментируйте Этап 2, затем:
#   sudo certbot --nginx -d orenrtisnab.ru -d www.orenrtisnab.ru -d admin.orenrtisnab.ru

upstream orenrtisnab_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ========== ЭТАП 1: только IP (без SSL) ==========

server {
    listen 80;
    server_name 31.129.103.174;

    location / {
        proxy_pass http://orenrtisnab_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

