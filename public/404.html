<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 — страница не найдена | ОРЕНРТИСНАБ</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://static.figma.com" crossorigin />
    <style>
      @font-face {
        font-family: 'Manrope';
        font-style: normal;
        font-weight: 400 800;
        font-display: swap;
        src: url('https://static.figma.com/font/Manrope_wght__1') format('woff2');
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: 'Manrope', Arial, sans-serif;
        color: #102d50;
        background: linear-gradient(180deg, #f5f7f9 0%, #ffffff 100%);
      }

      .card {
        width: 100%;
        max-width: 480px;
        padding: 40px 32px;
        text-align: center;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        box-shadow: 0 12px 40px rgba(16, 45, 80, 0.08);
      }

      .code {
        font-size: 72px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.06em;
        color: #0875e1;
      }

      h1 {
        margin: 16px 0 8px;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: #64748b;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        padding: 0 20px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        transition: background 0.2s, color 0.2s;
      }

      .primary {
        background: #0875e1;
        color: #fff;
      }

      .primary:hover {
        background: #0768c9;
      }

      .secondary {
        background: #eef4f9;
        color: #102d50;
      }

      .secondary:hover {
        background: #dceaf5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="code">404</div>
      <h1>Страница не найдена</h1>
      <p>Такой страницы нет. Проверьте адрес или вернитесь на главную.</p>
      <div class="actions">
        <a class="primary" href="/">На главную</a>
        <a class="secondary" href="/#request">Оставить заявку</a>
      </div>
    </main>
  </body>
</html>
