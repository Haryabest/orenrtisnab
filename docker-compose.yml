services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orenrtisnab
      # Пароль задаётся при ПЕРВОМ запуске тома pgdata. Позже меняйте через ALTER USER (см. deploy/beget.md).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orenrtisnab}
      POSTGRES_DB: orenrtisnab
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orenrtisnab -d orenrtisnab']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
